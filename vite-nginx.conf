server {
    listen 80;

    root /usr/share/nginx/html;

    # Make the base location highly permissive for subpaths
    location /know_your_values {
        index index.html;
        # Try finding the exact file, if not fallback to index.html to let React Router handle
        try_files $uri $uri/ /know_your_values/index.html;
        
        # Kill caching
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # Catch all route that ensures anything else goes to know_your_values
    location / {
        return 301 /know_your_values/;
    }

    error_page 404 /know_your_values/index.html;
}
