server {
    listen 80;

    location = / {
        return 301 /know_your_value/;
    }

    location /know_your_value/ {
        alias /usr/share/nginx/html/know_your_value/;
        index index.html;
        try_files $uri $uri/ /know_your_value/index.html;
    }

    # Redirect any other traffic to the subpath
    location / {
        return 301 /know_your_value/;
    }

    error_page 404 /know_your_value/index.html;
}
